name: Publish to vcpkg Registry

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}' -replace '^v', ''
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Compute source archive SHA512
        shell: pwsh
        run: |
          $url = "https://github.com/${{ github.repository }}/archive/refs/tags/${{ github.ref_name }}.tar.gz"
          $out = "${{ runner.temp }}\source.tar.gz"

          for ($i = 0; $i -lt 5; $i++) {
            try {
              Invoke-WebRequest -Uri $url -OutFile $out -ErrorAction Stop
              break
            } catch {
              if ($i -eq 4) { throw }
              Write-Host "Archive not ready, retrying in $((5 * ($i + 1)))s..."
              Start-Sleep -Seconds (5 * ($i + 1))
            }
          }

          $hash = (Get-FileHash $out -Algorithm SHA512).Hash.ToLower()
          Write-Host "SHA512: $hash"
          "ARCHIVE_SHA512=$hash" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Prepare updated port files
        shell: pwsh
        run: |
          $portDir = "${{ runner.temp }}\ports\winelement"
          New-Item -ItemType Directory -Force -Path $portDir

          (Get-Content packaging/vcpkg/winelement/vcpkg.json -Raw) `
            -replace '"version-semver":\s*"[^"]*"', '"version-semver": "${{ env.VERSION }}"' |
            Set-Content "$portDir\vcpkg.json" -NoNewline

          (Get-Content packaging/vcpkg/winelement/portfile.cmake -Raw) `
            -replace 'SHA512\s+\S+', 'SHA512 ${{ env.ARCHIVE_SHA512 }}' |
            Set-Content "$portDir\portfile.cmake" -NoNewline

          Write-Host "Port files prepared at $portDir"

      - name: Setup vcpkg
        shell: pwsh
        run: |
          $vcpkgRoot = "${{ runner.temp }}\vcpkg-tool"
          git clone --depth 1 https://github.com/microsoft/vcpkg.git $vcpkgRoot
          echo $vcpkgRoot | Out-File -FilePath $env:GITHUB_PATH -Append
          & "$vcpkgRoot\bootstrap-vcpkg.bat"

      - name: Publish to vcpkg-registry branch
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $regDir = "${{ runner.temp }}\registry"
          $repoUrl = "https://x-access-token:$env:GITHUB_TOKEN@github.com/${{ github.repository }}.git"

          git ls-remote --exit-code --heads $repoUrl vcpkg-registry | Out-Null
          $branchCheckExit = $LASTEXITCODE

          if ($branchCheckExit -eq 0) {
            git clone --single-branch --branch vcpkg-registry $repoUrl $regDir
          } elseif ($branchCheckExit -eq 2) {
            Write-Host "Registry branch not found, creating new one..."
            New-Item -ItemType Directory -Force -Path $regDir
            Push-Location $regDir
            git init
            git remote add origin $repoUrl
            git switch --orphan vcpkg-registry
            git config user.name 'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            New-Item -ItemType Directory -Force -Path 'versions' | Out-Null
            '{"default":{}}' | Set-Content 'versions\baseline.json' -NoNewline
            git add versions\baseline.json
            git commit -m "Initialize vcpkg registry"
            Pop-Location
          } else {
            Write-Error "Failed to check vcpkg-registry branch; git ls-remote exited with $branchCheckExit"
            exit $branchCheckExit
          }

          Push-Location $regDir
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          $registryPortDir = Join-Path $regDir 'ports\winelement'
          if (Test-Path $registryPortDir) {
            $resolvedRegDir = (Resolve-Path $regDir).Path.TrimEnd('\') + '\'
            $resolvedPortDir = (Resolve-Path $registryPortDir).Path
            if (-not $resolvedPortDir.StartsWith($resolvedRegDir, [System.StringComparison]::OrdinalIgnoreCase)) {
              throw "Refusing to remove unexpected port directory: $resolvedPortDir"
            }
            Remove-Item -LiteralPath $resolvedPortDir -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $registryPortDir | Out-Null
          Copy-Item "${{ runner.temp }}\ports\winelement\*" $registryPortDir -Force

          $baselinePath = Join-Path $regDir 'versions\baseline.json'
          if (-not (Test-Path $baselinePath)) {
            New-Item -ItemType Directory -Force -Path (Split-Path $baselinePath) | Out-Null
            '{"default":{}}' | Set-Content $baselinePath -NoNewline
          }

          git add ports\winelement versions\baseline.json
          vcpkg format-manifest "$registryPortDir\vcpkg.json"
          vcpkg x-add-version winelement `
            --x-builtin-ports-root="$regDir\ports" `
            --x-builtin-registry-versions-dir="$regDir\versions" `
            --overwrite-version

          if ($LASTEXITCODE -eq 0) {
            git add ports\winelement versions
            git diff --cached --quiet
            if ($LASTEXITCODE -eq 0) {
              Write-Host "No vcpkg registry changes to publish"
            } else {
              git commit -m "Publish winelement ${{ env.VERSION }} to vcpkg registry"
              git push --set-upstream origin vcpkg-registry
              Write-Host "Published winelement ${{ env.VERSION }} to vcpkg-registry"
            }
          } else {
            Write-Error "vcpkg x-add-version failed with exit code $LASTEXITCODE"
            Pop-Location
            exit 1
          }
          Pop-Location
